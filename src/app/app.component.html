<div class="shell">
  <header class="shell__header">
    <h1 class="shell__title">Real-time stocks</h1>
    <p class="shell__subtitle">Up to four symbols · Click a card to pause or resume updates</p>
  </header>

  <div class="shell__grid">
    @for (s of stocks; track s.symbol) {
      <app-stock-card [quote]="quotes()[s.symbol]" />
    }
  </div>
</div>
